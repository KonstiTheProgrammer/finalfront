      <span id="tb-day">1. Januar 1936</span>
      <span id="tb-round" class="small"></span>
      <span class="speed">
        <button id="btn-pause"><svg class="ic"><use href="#i-pause"/></svg></button>
        <button id="btn-speed1"><svg class="ic"><use href="#i-play"/></svg></button>
        <button id="btn-speed2"><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg></button>
        <button id="btn-speed3"><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg></button>
        <button id="btn-speed4"><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg><svg class="ic"><use href="#i-play"/></svg></button>
      </span>
    </div>
  </div>

  <!-- Linke Menüleiste (HOI4-Stil) -->
  <div id="sidebar">
    <button data-tab="bauen"><svg class="ic"><use href="#i-build"/></svg></button>
    <button data-tab="armeen"><svg class="ic"><use href="#i-soldier"/></svg></button>
    <button data-tab="nationen"><svg class="ic"><use href="#i-globe"/></svg></button>
    <button data-tab="info"><svg class="ic"><use href="#i-info"/></svg></button>
  </div>

  <!-- Ausklappbares Panel neben der Menüleiste -->
  <div id="panel" class="hidden">
    <div id="panel-head">
      <b id="panel-title"></b>
      <button id="panel-close" class="mini"><svg class="ic"><use href="#i-close"/></svg></button>
    </div>
    <div id="panel-content"></div>
  </div>

  <!-- Einheiten-Leiste unten (HOI4-Stil) -->
  <div id="unitbar" class="hidden">
    <div id="unitbar-head"></div>
    <div id="unitbar-cards"></div>
    <div id="unitbar-actions"></div>
  </div>

  <!-- Spawn-Phase: Startplatz wählen -->
  <div id="spawn-banner" class="hidden"><svg class="ic"><use href="#i-pin"/></svg> <b><span id="spawn-count">15</span></b>
    <button id="spawn-ready"><svg class="ic"><use href="#i-check"/></svg></button></div>

  <!-- Sieg-Countdown-Banner -->
  <div id="vp-banner" class="hidden"></div>

  <!-- Geführtes erstes Match -->
  <div id="tutorial" class="hidden"></div>

  <!-- Replay-Anzeige -->
  <div id="replay-badge" class="hidden"><svg class="ic"><use href="#i-replay"/></svg></div>

  <!-- Live-Rangliste -->
  <div id="ranking"></div>

  <!-- Minimap -->
  <canvas id="minimap" width="256" height="176"></canvas>

  <!-- Ereignis-Log -->
  <div id="log"></div>

  <!-- Multiplayer-Chat (Enter) -->
  <div id="chat-log" class="hidden"></div>
  <div id="chat-input"><svg class="ic"><use href="#i-chat"/></svg><input maxlength="160"></div>

  <!-- Toasts -->
  <div id="toasts"></div>

  <!-- Bündnisangebote -->
  <div id="offers"></div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Startbildschirm -->
  <div id="start" class="overlay">
    <div class="overlay-box">
      <h1>FINAL FRONT</h1>
      <div id="mp-block">
        <button id="btn-mp" class="wide continue"><svg class="ic"><use href="#i-globe"/></svg> 5<svg class="ic"><use href="#i-people"/></svg></button>
        <button id="btn-mp-duel" class="wide continue"><svg class="ic"><use href="#i-swords"/></svg> 1v1</button>
        <div id="mp-status" class="small"><svg class="ic"><use href="#i-globe"/></svg> …</div>
        <div class="small" style="margin-top:6px"><label><svg class="ic"><use href="#i-people"/></svg> <input id="mp-name" maxlength="20"></label></div>
      </div>
      <h2><svg class="ic"><use href="#i-bot"/></svg></h2>
      <button id="btn-continue" class="wide continue hidden"><svg class="ic"><use href="#i-play"/></svg> <svg class="ic"><use href="#i-save"/></svg></button>
      <div id="map-grid"></div>
      <div id="nation-grid"></div>
    </div>
  </div>

  <!-- Multiplayer-Lobby -->
  <div id="mp-lobby" class="overlay hidden">
    <div class="overlay-box small-box">
      <h1><svg class="ic big"><use href="#i-globe"/></svg></h1>
      <p id="mp-lobby-map" class="small"></p>
      <canvas id="mp-lobby-preview" width="220" height="150"></canvas>
      <div id="mp-lobby-list"><p class="hint"><svg class="ic"><use href="#i-hourglass"/></svg></p></div>
      <button id="mp-ready" class="wide continue"><svg class="ic"><use href="#i-check"/></svg></button>
      <button id="mp-leave" class="wide danger"><svg class="ic"><use href="#i-back"/></svg></button>
    </div>
  </div>

  <!-- Endbildschirm -->
  <div id="gameover" class="overlay hidden">
    <div class="overlay-box small-box">
      <h1></h1>
      <p></p>
      <div id="gameover-stats"></div>
      <button id="gameover-lobby" class="wide continue hidden"><svg class="ic"><use href="#i-globe"/></svg></button>
      <button id="gameover-replay" class="wide hidden"><svg class="ic"><use href="#i-replay"/></svg></button>
      <button id="gameover-restart" class="wide"><svg class="ic"><use href="#i-restart"/></svg></button>
    </div>
  </div>


  <script src="js/mapdata.js?v=47"></script>
  <script src="js/map.js?v=47"></script>
  <script src="js/game.js?v=47"></script>
  <script src="js/ui.js?v=47"></script>
  <script src="js/net.js?v=47"></script>
  <script src="js/main.js?v=47"></script>
</body>
</html>
