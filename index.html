<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Front — Europa in Flammen</title>
  <link rel="stylesheet" href="style.css?v=41">
</head>
<body>
  <canvas id="map"></canvas>

  <!-- Obere Leiste: Ressourcen links, Datum + Geschwindigkeit rechts (HOI4-Stil) -->
  <div id="topbar">
    <div class="tb-group" id="tb-nation"></div>
    <div class="tb-group">🪙 <span id="tb-gold">0</span></div>
    <div class="tb-group">👥 <span id="tb-mp">0</span></div>
    <div class="tb-group">🔩 <span id="tb-eisen">0</span></div>
    <div class="tb-group">🐎 <span id="tb-pferde">0</span></div>
    <div class="tb-group">🪖 <span id="tb-div">0</span></div>
    <div class="tb-group">🏛️ <span id="tb-vp">1/3</span></div>
    <div class="tb-group">🗺️ <span id="tb-prov">0</span></div>
    <div class="tb-spacer"></div>
    <div class="tb-group">
      <button id="btn-supply">🚚</button>
      <button id="hud-log">📜</button>
      <button id="hud-rank">🏆</button>
      <button id="hud-mini">🗺️</button>
      <button id="btn-save">💾</button>
      <button id="btn-load">📂</button>
      <button id="btn-restart">🔄</button>
    </div>
    <div class="tb-group" id="tb-datebox">
      <span id="tb-live" class="hidden"></span>
      <span id="tb-day">1. Januar 1936</span>
      <span id="tb-round" class="small"></span>
      <span class="speed">
        <button id="btn-pause">⏸</button>
        <button id="btn-speed1">▶</button>
        <button id="btn-speed2">▶▶</button>
        <button id="btn-speed3">▶▶▶</button>
        <button id="btn-speed4">▶▶▶▶</button>
      </span>
    </div>
  </div>

  <!-- Linke Menüleiste (HOI4-Stil) -->
  <div id="sidebar">
    <button data-tab="bauen">🏗️</button>
    <button data-tab="armeen">🪖</button>
    <button data-tab="nationen">🌍</button>
    <button data-tab="info">ℹ️</button>
  </div>

  <!-- Ausklappbares Panel neben der Menüleiste -->
  <div id="panel" class="hidden">
    <div id="panel-head">
      <b id="panel-title"></b>
      <button id="panel-close" class="mini">✕</button>
    </div>
    <div id="panel-content"></div>
  </div>

  <!-- Einheiten-Leiste unten (HOI4-Stil) -->
  <div id="unitbar" class="hidden">
    <div id="unitbar-head"></div>
    <div id="unitbar-cards"></div>
    <div id="unitbar-actions"></div>
  </div>

  <!-- Spawn-Phase: Startplatz wählen -->
  <div id="spawn-banner" class="hidden">📍 <b><span id="spawn-count">15</span></b>
    <button id="spawn-ready">✔</button></div>

  <!-- Sieg-Countdown-Banner -->
  <div id="vp-banner" class="hidden"></div>

  <!-- Geführtes erstes Match -->
  <div id="tutorial" class="hidden"></div>

  <!-- Replay-Anzeige -->
  <div id="replay-badge" class="hidden">🎬 REPLAY — Eingaben gesperrt</div>

  <!-- Live-Rangliste -->
  <div id="ranking"></div>

  <!-- Minimap -->
  <canvas id="minimap" width="256" height="176"></canvas>

  <!-- Ereignis-Log -->
  <div id="log"></div>

  <!-- Multiplayer-Chat (Enter) -->
  <div id="chat-log" class="hidden"></div>
  <div id="chat-input"><input maxlength="160" placeholder="💬"></div>

  <!-- Toasts -->
  <div id="toasts"></div>

  <!-- Bündnisangebote -->
  <div id="offers"></div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Startbildschirm -->
  <div id="start" class="overlay">
    <div class="overlay-box">
      <h1>FINAL FRONT</h1>
      <div id="mp-block">
        <button id="btn-mp" class="wide continue">🌐 5👤</button>
        <button id="btn-mp-duel" class="wide continue">⚔️ 1v1</button>
        <div id="mp-status" class="small">🌐 …</div>
        <div class="small" style="margin-top:6px"><label>👤 <input id="mp-name" maxlength="20"></label></div>
      </div>
      <h2>🤖</h2>
      <button id="btn-continue" class="wide continue hidden">▶ 💾</button>
      <div id="map-grid"></div>
      <div id="nation-grid"></div>
    </div>
  </div>

  <!-- Multiplayer-Lobby -->
  <div id="mp-lobby" class="overlay hidden">
    <div class="overlay-box small-box">
      <h1>🌐</h1>
      <p id="mp-lobby-map" class="small"></p>
      <canvas id="mp-lobby-preview" width="220" height="150"></canvas>
      <div id="mp-lobby-list"><p class="hint">⏳</p></div>
      <button id="mp-ready" class="wide continue">✔</button>
      <button id="mp-leave" class="wide danger">←</button>
    </div>
  </div>

  <!-- Endbildschirm -->
  <div id="gameover" class="overlay hidden">
    <div class="overlay-box small-box">
      <h1></h1>
      <p></p>
      <div id="gameover-stats"></div>
      <button id="gameover-lobby" class="wide continue hidden">🌐</button>
      <button id="gameover-replay" class="wide hidden">🎬</button>
      <button id="gameover-restart" class="wide">🔄</button>
    </div>
  </div>


  <script src="js/mapdata.js?v=41"></script>
  <script src="js/map.js?v=41"></script>
  <script src="js/game.js?v=41"></script>
  <script src="js/ui.js?v=41"></script>
  <script src="js/net.js?v=41"></script>
  <script src="js/main.js?v=41"></script>
</body>
</html>
